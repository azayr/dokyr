<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#f5f7fa" />
    <meta name="description" content="Dokyr — a calm, self-hosted deployment control plane for projects, servers, and proxies." />
    <script>
      try {
        var stored = localStorage.getItem('dokyr-theme');
        if (!stored) {
          var legacy = localStorage.getItem('selfhost-theme');
          if (legacy === 'dark' || legacy === 'light') {
            stored = legacy;
            localStorage.setItem('dokyr-theme', legacy);
            localStorage.removeItem('selfhost-theme');
          }
        }
        var dark = stored === 'dark' || (stored === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.classList.add('theme-dark');
          document.querySelector('meta[name="theme-color"]').content = '#0c1117';
        }
      } catch (error) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Dokyr — Deployment control plane</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display:contents">%sveltekit.body%</div>
  </body>
</html>
